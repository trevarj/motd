# test/e2e/hermetic/ergo/ircd.yaml — hermetic upstream IRCd for the MOTD e2e stack.
#
# ergo (formerly oragono) is the UPSTREAM network that soju proxies. It runs on
# the internal docker network only; the app never talks to it directly (it talks
# to soju). Therefore this listener is PLAINTEXT on :6667 — TLS is terminated by
# soju on the app-facing side. Do NOT expose this port outside the compose net.
#
# Goals for the e2e run:
#   - permit SASL PLAIN + the IRCv3 caps the app/soju use (server-time,
#     message-tags, batch, chathistory, echo-message, account-tag, …). ergo
#     enables all of these by default; we keep them on.
#   - allow account registration before connect (soju registers the `motd`
#     upstream account, the seeder registers `motdadb2`).
#   - host the seed channel `##motdtest` with a topic.
#
# Config kept intentionally small; ergo fills unset keys with built-in defaults.
network:
    name: HermeticTest

server:
    name: ergo.test
    listeners:
        # Plaintext only, all interfaces, inside the compose network.
        ":6667":
    sts:
        enabled: false
    casemapping: precis
    enforce-utf8: true
    lookup-hostnames: false
    ip-cloaking:
        enabled: false
    # No connection throttling — the seeder + soju reconnect rapidly in CI.
    ip-limits:
        count: false
        throttle: false
    max-sendq: 96k
    compatibility:
        force-trailing: true
        send-unprefixed-sasl: true
    ident-timeout: 100ms

accounts:
    authentication-enabled: true
    registration:
        enabled: true
        # The seeder + soju REGISTER before completing registration (no email).
        allow-before-connect: true
        email-verification:
            enabled: false
        bcrypt-cost: 4
        throttling:
            enabled: false
    # Let clients authenticate with SASL PLAIN (what soju + the seeder use).
    login-throttling:
        enabled: false
    # No nick-reservation friction in the test harness.
    nick-reservation:
        enabled: false
    multiclient:
        enabled: true
        allowed-by-default: true
        # Keep upstream behavior close to a plain ircd; soju is the bouncer here.
        always-on: "opt-in"

channels:
    default-modes: +nt
    registration:
        enabled: true

# History: ergo keeps in-memory history for the upstream side. soju maintains
# its OWN persistent message-store (db) for what it replays to the app, so the
# app's CHATHISTORY backfill does not depend on ergo history surviving restarts.
history:
    enabled: true
    channel-length: 2048
    client-length: 256
    autoresize-window: 0
    autoreplay-on-join: 0
    chathistory-maxmessages: 1000
    znc-maxmessages: 100
    restrictions:
        expire-time: 0
    persistent:
        enabled: false

datastore:
    path: /ircd/ircd.db
    autoupgrade: true

languages:
    enabled: true
    default: en
    # The ergo docker image ships translations under /ircd-bin/languages.
    path: /ircd-bin/languages

limits:
    nicklen: 32
    identlen: 20
    channellen: 64
    awaylen: 390
    kicklen: 390
    topiclen: 390
    monitor-entries: 100
    whowas-entries: 100
    chan-list-modes: 60
    registration-messages: 1024

logging:
    -
        method: stderr
        type: "* -userinput -useroutput"
        level: info

debug:
    recover-from-errors: true
