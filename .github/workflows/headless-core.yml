name: Required headless core

on:
  workflow_call:
    inputs:
      checkout_ref: { required: false, type: string }
      expected_sha: { required: false, type: string }
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: Ref to check out
        required: true
        type: string
      expected_sha:
        description: Exact commit SHA required after checkout
        required: true
        type: string

permissions:
  contents: read

jobs:
  headless-core:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
      - name: Verify requested source identity
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with: { distribution: temurin, java-version: 21 }
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Start hermetic bouncer stack
        run: ./test/e2e/hermetic-stack.sh up
      - name: Run required isolated journeys
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: ./test/e2e/fast-suite.sh connected
      - name: Upload privacy-safe required diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: headless-core-diagnostics
          path: test/e2e/artifacts/fast-suite/**
          if-no-files-found: ignore
      - name: Tear down hermetic stack
        if: always()
        run: ./test/e2e/hermetic-stack.sh down || true
