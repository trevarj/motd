name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  hermetic-e2e:
    # Set repository variable ENABLE_RELEASE_HERMETIC_E2E=true to re-enable.
    if: ${{ vars.ENABLE_RELEASE_HERMETIC_E2E == 'true' }}
    uses: ./.github/workflows/e2e.yml
    with:
      phases: 'a b c'

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@v4
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/keystore.jks"
      - name: Full build, tests, lint, and signed release APK
        env:
          MOTD_KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          MOTD_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          MOTD_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          MOTD_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          MOTD_VERSION_NAME: ${{ github.ref_name }}
          MOTD_VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew build :app:lintDebug --stacktrace --no-daemon
      - name: Prepare licensed release assets
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ./third_party/sing-box/prepare-release-assets.sh \
            "${{ github.ref_name }}" \
            app/build/outputs/apk/release/app-release.apk \
            release-assets
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-assets/release-compliance.md
          fail_on_unmatched_files: true
          files: |
            release-assets/motd-${{ github.ref_name }}.apk
            release-assets/motd-libbox-source-${{ github.ref_name }}.tar.gz
            release-assets/LICENSE
            release-assets/SHA256SUMS
            release-assets/motd-${{ github.ref_name }}-THIRD_PARTY_NOTICES.md
          generate_release_notes: true
