name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    # The managed-device smoke remains available via smoke.yml, but is temporarily not a
    # release gate: hosted AOSP emulators intermittently surface a System UI ANR before MOTD's
    # onboarding can run. The release build below still runs all unit tests and lint checks.
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with: { distribution: temurin, java-version: 21 }
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/keystore.jks"
      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          version_name="$(sed -n 's/^motdVersionName=//p' gradle.properties)"
          version_code="$(sed -n 's/^motdVersionCode=//p' gradle.properties)"
          [[ "$GITHUB_REF_NAME" == "v$version_name" ]] || {
            echo "tag $GITHUB_REF_NAME does not match gradle.properties version $version_name" >&2
            exit 1
          }
          [[ "$version_code" =~ ^[0-9]+$ ]] || {
            echo "invalid motdVersionCode: $version_code" >&2
            exit 1
          }
          printf 'MOTD_VERSION_NAME=%s\nMOTD_VERSION_CODE=%s\nMOTD_SOURCE_COMMIT=%s\n' \
            "$version_name" "$version_code" "$GITHUB_SHA" >> "$GITHUB_ENV"
      - name: Full build, tests, lint, and signed release APK
        env:
          MOTD_KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          MOTD_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          MOTD_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          MOTD_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: >-
          ./gradlew :irc:build
          :app:testFossDebugUnitTest :app:testFossReleaseUnitTest
          :app:lintFossDebug :app:lintFossRelease :app:assembleFossRelease
          --stacktrace --no-daemon --max-workers=1
      - name: Verify F-Droid-compatible APK signing blocks
        run: >-
          java .github/scripts/CheckApkSigningBlocks.java
          app/build/outputs/apk/foss/release/app-foss-release.apk
      - name: Prepare licensed release assets
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ./third_party/sing-box/prepare-release-assets.sh \
            "${{ github.ref_name }}" \
            app/build/outputs/apk/foss/release/app-foss-release.apk \
            release-assets
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          body_path: release-assets/release-compliance.md
          fail_on_unmatched_files: true
          files: |
            release-assets/motd-${{ github.ref_name }}-foss.apk
            release-assets/motd-libbox-source-${{ github.ref_name }}.tar.gz
            release-assets/LICENSE
            release-assets/IBM-PLEX-LICENSE.txt
            release-assets/SHA256SUMS
            release-assets/motd-${{ github.ref_name }}-THIRD_PARTY_NOTICES.md
          generate_release_notes: true
