name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pure-JVM protocol module: fast, no Android SDK needed. Runs in parallel
  # with the app job so a slow/hanging app build never blocks irc feedback.
  irc:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@v4
      - name: irc unit tests
        run: ./gradlew :irc:test --stacktrace

  # Android app: unit tests, lint, and debug APK. Uses the preinstalled
  # Android SDK on ubuntu-latest (no SDK download) plus the Gradle cache.
  app:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@v4
      - name: App unit tests
        run: ./gradlew :app:testFossDebugUnitTest --stacktrace
      # Lint runs isolated with a single worker and no daemon to avoid the
      # flaky Gradle-worker classloader race that surfaces as
      # NoClassDefFoundError in ModifierDeclarationDetector. A bounded retry
      # (2 attempts) covers the rare case it still races.
      - name: Android lint (warnings as errors)
        run: |
          for attempt in 1 2; do
            echo "::group::lint attempt $attempt"
            ./gradlew :app:lintFossDebug --stacktrace \
              -Dorg.gradle.workers.max=1 && { echo "::endgroup::"; exit 0; }
            echo "::endgroup::"
            echo "lint attempt $attempt failed; retrying" >&2
          done
          exit 1
      - name: Assemble debug APK
        run: ./gradlew :app:assembleFossDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: motd-debug
          path: app/build/outputs/apk/foss/debug/app-foss-debug.apk

  # Required product-level acceptance tier: a stock AOSP image, the real app,
  # and a hermetic soju -> ergo network. Android Test Orchestrator isolates the
  # four highest-value user journeys from one another.
  headless-core:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start hermetic bouncer stack
        run: docker compose -f test/e2e/hermetic/docker-compose.yml up --build -d --wait

      # This is the same AOSP managed-device task exercised by the dedicated
      # fast-headless smoke workflow. It avoids the flaky direct emulator action
      # while retaining Android Test Orchestrator isolation and the complete
      # hermetic soju -> ergo user journeys.
      - name: Run fast headless journeys
        run: |
          ./gradlew headlessApi34FossE2eAndroidTest \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            -Pandroid.testInstrumentationRunnerArguments.annotation=io.github.trevarj.motd.FastHeadlessE2e \
            -Pandroid.testInstrumentationRunnerArguments.sojuHost=10.0.2.2 \
            -Pandroid.testInstrumentationRunnerArguments.sojuPort=6697 \
            -Pandroid.testInstrumentationRunnerArguments.sojuUser=motd \
            -Pandroid.testInstrumentationRunnerArguments.sojuPassword=motdtest \
            -Pandroid.testInstrumentationRunnerArguments.nick=motdadb \
            -Pandroid.testInstrumentationRunnerArguments.channel=##motdtest \
            -Pandroid.testInstrumentationRunnerArguments.secondNick=motdadb2 \
            --stacktrace

      - name: Upload headless diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: headless-core-diagnostics
          path: |
            app/build/reports/androidTests/**
            app/build/outputs/androidTest-results/**
          if-no-files-found: ignore

      - name: Dump bouncer logs on failure
        if: failure()
        run: docker compose -f test/e2e/hermetic/docker-compose.yml logs --no-color || true

      - name: Tear down hermetic stack
        if: always()
        run: docker compose -f test/e2e/hermetic/docker-compose.yml down -v || true

  gate:
    if: always()
    needs: [irc, app, headless-core]
    runs-on: ubuntu-latest
    steps:
      - name: Require every CI tier
        env:
          IRC_RESULT: ${{ needs.irc.result }}
          APP_RESULT: ${{ needs.app.result }}
          HEADLESS_RESULT: ${{ needs.headless-core.result }}
        run: |
          test "$IRC_RESULT" = success
          test "$APP_RESULT" = success
          test "$HEADLESS_RESULT" = success
