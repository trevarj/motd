name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pure-JVM protocol module: fast, no Android SDK needed. Runs in parallel
  # with the app job so a slow/hanging app build never blocks irc feedback.
  irc:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MOTD_FUZZ_PROFILE: pr
      MOTD_FUZZ_SEED: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: irc unit tests
        run: ./gradlew :irc:test --stacktrace
      - name: Upload IRC generated-test failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: irc-fuzz-failure-${{ github.run_id }}
          path: |
            irc/build/fuzz-failures/**
            irc/build/reports/tests/test/**
          if-no-files-found: ignore

  # Android app: unit tests, lint, and debug APK. Uses the preinstalled
  # Android SDK on ubuntu-latest (no SDK download) plus the Gradle cache.
  app:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      MOTD_FUZZ_PROFILE: pr
      MOTD_FUZZ_SEED: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: App unit tests
        run: ./gradlew :app:testFossDebugUnitTest --stacktrace
      - name: Upload app generated-test failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-fuzz-failure-${{ github.run_id }}
          path: |
            app/build/fuzz-failures/**
            app/build/reports/tests/testFossDebugUnitTest/**
          if-no-files-found: ignore
      - name: Verify checked-in Room schemas
        run: |
          git diff --exit-code -- app/schemas
          test -z "$(git ls-files --others --exclude-standard -- app/schemas)"
      # Lint runs isolated with a single worker and no daemon to avoid the
      # flaky Gradle-worker classloader race that surfaces as
      # NoClassDefFoundError in ModifierDeclarationDetector. A bounded retry
      # (2 attempts) covers the rare case it still races.
      - name: Android lint (warnings as errors)
        run: |
          for attempt in 1 2; do
            echo "::group::lint attempt $attempt"
            ./gradlew :app:lintFossDebug --stacktrace \
              -Dorg.gradle.workers.max=1 && { echo "::endgroup::"; exit 0; }
            echo "::endgroup::"
            echo "lint attempt $attempt failed; retrying" >&2
          done
          exit 1
      - name: Assemble debug APK
        run: ./gradlew :app:assembleFossDebug --stacktrace
      - name: Validate E2E shell and Compose configuration
        run: ./test/e2e/validate.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: motd-debug
          path: app/build/outputs/apk/foss/debug/app-foss-debug.apk

  # Required product-level acceptance tier: a stock AOSP image, the real app,
  # and a hermetic soju -> ergo network. Android Test Orchestrator isolates the
  # four highest-value user journeys from one another.
  headless-core:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start hermetic bouncer stack
        run: ./test/e2e/hermetic-stack.sh up

      - name: Run fast headless journeys
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: ./test/e2e/fast-suite.sh connected

      - name: Capture bouncer diagnostics
        if: failure()
        run: ./test/e2e/hermetic-stack.sh capture test/e2e/artifacts/fast-suite

      - name: Upload headless diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: headless-core-diagnostics
          path: |
            app/build/reports/androidTests/**
            app/build/outputs/androidTest-results/**
            test/e2e/artifacts/fast-suite/**
          if-no-files-found: ignore

      - name: Tear down hermetic stack
        if: always()
        run: ./test/e2e/hermetic-stack.sh down || true

  gate:
    if: always()
    needs: [irc, app, headless-core]
    runs-on: ubuntu-latest
    steps:
      - name: Require every CI tier
        env:
          IRC_RESULT: ${{ needs.irc.result }}
          APP_RESULT: ${{ needs.app.result }}
          HEADLESS_RESULT: ${{ needs.headless-core.result }}
        run: |
          test "$IRC_RESULT" = success
          test "$APP_RESULT" = success
          test "$HEADLESS_RESULT" = success
