name: Fast headless E2E (hermetic)

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  soju-vless-reality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # This is a socket-level proof; no Android device is involved.
      MOTD_SKIP_ADB_REVERSE: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install pinned Nix tooling
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Prove Soju history through VLESS + REALITY
        env:
          MOTD_STACK_DIR: ${{ runner.temp }}/motd-vless-reality
        run: |
          ./test/e2e/local-stack.sh up
          ./test/e2e/local-stack.sh history-check
          ./test/e2e/local-stack.sh obfs-xray-up
          ./test/e2e/local-stack.sh obfs-xray-validate
          ./test/e2e/local-stack.sh obfs-xray-history-check
          ./test/e2e/local-stack.sh obfs-xray-negative

      - name: Upload proxy-stack diagnostics
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: soju-vless-reality-diagnostics
          path: ${{ runner.temp }}/motd-vless-reality/**/*.log
          if-no-files-found: ignore

      - name: Tear down proxy stack
        if: always()
        env:
          MOTD_STACK_DIR: ${{ runner.temp }}/motd-vless-reality
        run: |
          ./test/e2e/local-stack.sh obfs-xray-down || true
          ./test/e2e/local-stack.sh down || true

  fast-headless:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start hermetic soju and ergo
        run: ./test/e2e/hermetic-stack.sh up

      - name: Run isolated Kotlin headless journeys
        run: ./test/e2e/fast-suite.sh managed

      - name: Capture bouncer diagnostics
        if: failure()
        run: ./test/e2e/hermetic-stack.sh capture test/e2e/artifacts/fast-suite

      - name: Upload smoke reports
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: fast-headless-e2e-reports
          path: |
            app/build/reports/androidTests/**
            app/build/outputs/androidTest-results/**
            test/e2e/artifacts/fast-suite/**
          if-no-files-found: ignore

      - name: Tear down hermetic stack
        if: always()
        run: ./test/e2e/hermetic-stack.sh down || true
