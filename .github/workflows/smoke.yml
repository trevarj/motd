name: Fast headless E2E (hermetic)

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  soju-vless-reality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # This is a socket-level proof; no Android device is involved.
      MOTD_SKIP_ADB_REVERSE: "1"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install pinned Nix tooling
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Prove Soju history through VLESS + REALITY
        env:
          MOTD_STACK_DIR: ${{ runner.temp }}/motd-vless-reality
        run: |
          ./test/e2e/local-stack.sh up
          ./test/e2e/local-stack.sh history-check
          ./test/e2e/local-stack.sh obfs-xray-up
          ./test/e2e/local-stack.sh obfs-xray-validate
          ./test/e2e/local-stack.sh obfs-xray-history-check
          ./test/e2e/local-stack.sh obfs-xray-negative

      - name: Upload proxy-stack diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: soju-vless-reality-diagnostics
          path: ${{ runner.temp }}/motd-vless-reality/**/*.log
          if-no-files-found: ignore

      - name: Tear down proxy stack
        if: always()
        env:
          MOTD_STACK_DIR: ${{ runner.temp }}/motd-vless-reality
        run: |
          ./test/e2e/local-stack.sh obfs-xray-down || true
          ./test/e2e/local-stack.sh down || true

  fast-headless:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with: { distribution: temurin, java-version: 21 }
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start hermetic soju and ergo
        run: ./test/e2e/hermetic-stack.sh up

      - name: Run isolated Kotlin headless journeys
        run: ./test/e2e/fast-suite.sh managed

      - name: Upload privacy-safe required diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fast-headless-e2e-diagnostics
          path: test/e2e/artifacts/fast-suite/**
          if-no-files-found: ignore

      - name: Tear down hermetic stack
        if: always()
        run: ./test/e2e/hermetic-stack.sh down || true
