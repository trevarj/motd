name: E2E (hermetic emulator)

# Slow, KVM-backed end-to-end acceptance run: boots a headless Android emulator,
# stands up a self-contained soju+ergo bouncer stack, installs the debug APK, and
# drives the app via the device runbook (test/e2e/runbook.sh) against the LOCAL
# bouncer. No external network, no secrets.
#
# The exhaustive shell-driven journey is intentionally non-blocking: manual + nightly only.
on:
  workflow_dispatch:
    inputs:
      phases:
        description: 'Phases to run (space-separated, e.g. "a b c" or "a b c d e f g h i")'
        required: false
        default: 'a b c d e f g h i'
  schedule:
    # Nightly at 04:17 UTC (odd minute to avoid the top-of-hour stampede).
    - cron: '17 4 * * *'

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # --- Build the debuggable, x86-installable E2E APK ----------------------
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Assemble E2E APK
        run: ./gradlew :app:assembleFossE2e --stacktrace
      - name: Verify E2E APK omits the arm64-only native core
        run: |
          if unzip -Z1 app/build/outputs/apk/foss/e2e/app-foss-e2e.apk | grep -q '/libbox.so$'; then
            echo "E2E APK unexpectedly contains libbox JNI" >&2
            exit 1
          fi

      # --- KVM for a fast, hardware-accelerated emulator --------------------
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # --- Stand up the hermetic bouncer stack ------------------------------
      - name: Start hermetic bouncer stack
        run: ./test/e2e/hermetic-stack.sh up
      - name: Dump stack logs (provisioning + seed)
        run: ./test/e2e/hermetic-stack.sh logs

      # --- CI env for the runbook (runbook.sh sources test/e2e/.env) --------
      - name: Install CI env
        env:
          E2E_PHASES_INPUT: ${{ github.event.inputs.phases || 'a b c d e f g h i' }}
        run: |
          cp test/e2e/.env.ci test/e2e/.env
          # Allow the workflow input to widen/narrow phase coverage.
          if [ -n "$E2E_PHASES_INPUT" ]; then
            # %q emits a source-safe shell assignment even when phases contains spaces.
            printf 'E2E_PHASES=%q\n' "$E2E_PHASES_INPUT" >> test/e2e/.env
          fi

      # --- Headless emulator + runbook --------------------------------------
      # AOSP (target: default) image — NOT google_apis — so Play Protect never
      # interferes with the debug install / uiautomator driving.
      - name: Run e2e runbook on emulator
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: |
            adb install -r -g app/build/outputs/apk/foss/e2e/app-foss-e2e.apk
            ./test/e2e/runbook.sh

      # --- Artifacts on failure ---------------------------------------------
      - name: Capture stack diagnostics
        if: failure()
        run: ./test/e2e/hermetic-stack.sh capture test/e2e/artifacts
      - name: Upload e2e artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts
          path: test/e2e/artifacts/**
          if-no-files-found: ignore
      - name: Tear down stack
        if: always()
        run: ./test/e2e/hermetic-stack.sh down || true
